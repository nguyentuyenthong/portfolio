<svg width="640" height="400" viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg" font-family="'Inter Tight','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2fb"/>
      <stop offset="1" stop-color="#dde6f4"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#1e293b" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="640" height="400" fill="url(#bg)"/>
  <circle cx="560" cy="60" r="150" fill="#ffffff" opacity="0.35"/>
  <circle cx="70" cy="370" r="120" fill="#175cd3" opacity="0.06"/>

  <!-- app window -->
  <g filter="url(#sh)">
    <rect x="70" y="70" width="500" height="268" rx="16" fill="#ffffff"/>
  </g>
  <!-- top bar -->
  <path d="M70 86 a16 16 0 0 1 16 -16 h468 a16 16 0 0 1 16 16 v14 h-500 z" fill="#f7f8fa"/>
  <line x1="70" y1="100" x2="570" y2="100" stroke="#eef0f3" stroke-width="1"/>
  <circle cx="92" cy="85" r="4.5" fill="#ff5f57"/>
  <circle cx="108" cy="85" r="4.5" fill="#febc2e"/>
  <circle cx="124" cy="85" r="4.5" fill="#28c840"/>

  <!-- header -->
  <text x="92" y="134" font-size="16" font-weight="700" fill="#1d2433">Quản lý báo cáo bán hàng</text>
  <rect x="466" y="116" width="84" height="27" rx="8" fill="#175cd3"/>
  <text x="508" y="134" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Áp dụng</text>

  <!-- column headers -->
  <text x="92" y="170" font-size="9" font-weight="600" letter-spacing="0.5" fill="#9d9da0">TÊN BÁO CÁO</text>
  <text x="300" y="170" font-size="9" font-weight="600" letter-spacing="0.5" fill="#9d9da0">TIẾN ĐỘ</text>
  <text x="372" y="170" font-size="9" font-weight="600" letter-spacing="0.5" fill="#9d9da0">TRẠNG THÁI</text>
  <line x1="92" y1="180" x2="548" y2="180" stroke="#eef0f3" stroke-width="1"/>

  <!-- row 1 -->
  <text x="92" y="206" font-size="12.5" font-weight="600" fill="#175cd3">BCBH ngày 04/01/2026</text>
  <text x="300" y="206" font-size="12" fill="#344054">2/2</text>
  <rect x="370" y="195" width="80" height="21" rx="10.5" fill="#ececff"/>
  <text x="410" y="209" font-size="10.5" font-weight="600" fill="#2d2dfe" text-anchor="middle">Đang duyệt</text>
  <rect x="468" y="194" width="80" height="23" rx="8" fill="#e5f6f3"/>
  <text x="508" y="209" font-size="10.5" font-weight="600" fill="#03836e" text-anchor="middle">✓ Duyệt</text>
  <line x1="92" y1="226" x2="548" y2="226" stroke="#f1f3f6" stroke-width="1"/>

  <!-- row 2 -->
  <text x="92" y="252" font-size="12.5" font-weight="600" fill="#175cd3">BCBH ngày 03/01/2026</text>
  <text x="300" y="252" font-size="12" fill="#344054">1/2</text>
  <rect x="370" y="241" width="80" height="21" rx="10.5" fill="#ececff"/>
  <text x="410" y="255" font-size="10.5" font-weight="600" fill="#2d2dfe" text-anchor="middle">Đang duyệt</text>
  <rect x="468" y="240" width="80" height="23" rx="8" fill="#e5f6f3"/>
  <text x="508" y="255" font-size="10.5" font-weight="600" fill="#03836e" text-anchor="middle">✓ Duyệt</text>
  <line x1="92" y1="272" x2="548" y2="272" stroke="#f1f3f6" stroke-width="1"/>

  <!-- row 3 -->
  <text x="92" y="298" font-size="12.5" font-weight="600" fill="#175cd3">BCBH ngày 02/01/2026</text>
  <text x="300" y="298" font-size="12" fill="#344054">0/2</text>
  <rect x="370" y="287" width="80" height="21" rx="10.5" fill="#fef3d6"/>
  <text x="410" y="301" font-size="10.5" font-weight="600" fill="#b97803" text-anchor="middle">Chờ duyệt</text>
  <rect x="468" y="286" width="80" height="23" rx="8" fill="#e5f6f3"/>
  <text x="508" y="301" font-size="10.5" font-weight="600" fill="#03836e" text-anchor="middle">✓ Duyệt</text>

  <!-- floating tag -->
  <g filter="url(#sh)">
    <rect x="70" y="316" width="186" height="40" rx="20" fill="#0d1322"/>
  </g>
  <circle cx="92" cy="336" r="5" fill="#04a489"/>
  <text x="106" y="340" font-size="12.5" font-weight="600" fill="#ffffff">Multi-level approval flow</text>
</svg>
