<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Toggle — Thickness</title>
  <link rel="stylesheet" href="../../foundations/thickness.css" />
  <link rel="stylesheet" href="../../foundations/base.css" />
  <link rel="stylesheet" href="../_shared/demo-shell.css" />
  <link rel="stylesheet" href="toggle.css" />
</head>
<body class="light-mode">
  <div class="demo-page">
    <p class="demo-page__back"><a href="../../demo/index.html">← Component index</a></p>
    <h1 class="demo-page__title">Toggle</h1>
    <label class="uu-toggle">
      <input class="uu-toggle__input" type="checkbox" role="switch" checked />
      <span class="uu-toggle__track"><span class="uu-toggle__thumb"></span></span>
      <span class="uu-toggle__label">Remember me</span>
    </label>
    <label class="uu-toggle uu-toggle--md" style="margin-top:1rem;display:flex">
      <input class="uu-toggle__input" type="checkbox" role="switch" />
      <span class="uu-toggle__track"><span class="uu-toggle__thumb"></span></span>
      <span class="uu-toggle__label">md</span>
    </label>
  </div>
</body>
</html>
