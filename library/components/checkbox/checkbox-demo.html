<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkbox — Thickness</title>
  <link rel="stylesheet" href="../../foundations/thickness.css" />
  <link rel="stylesheet" href="../../foundations/base.css" />
  <link rel="stylesheet" href="../_shared/demo-shell.css" />
  <link rel="stylesheet" href="checkbox.css" />
</head>
<body class="light-mode">
  <div class="demo-page">
    <p class="demo-page__back"><a href="../../demo/index.html">← Component index</a></p>
    <h1 class="demo-page__title">Checkbox</h1>
    <label class="uu-checkbox">
      <input class="uu-checkbox__input" type="checkbox" checked />
      <span class="uu-checkbox__box">
        <svg class="uu-checkbox__mark" width="10" height="8" viewBox="0 0 14 14" aria-hidden="true"><path d="M11.67 3.5L5.25 9.92 2.33 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg class="uu-checkbox__indet" width="10" height="2" viewBox="0 0 14 14" aria-hidden="true"><path d="M2.92 7H11.08" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span><span class="uu-checkbox__label">Remember me</span><span class="uu-checkbox__hint">Save my login details for next time.</span></span>
    </label>
    <label class="uu-checkbox uu-checkbox--md" style="margin-top:1rem">
      <input class="uu-checkbox__input" type="checkbox" />
      <span class="uu-checkbox__box">
        <svg class="uu-checkbox__mark" width="12" height="10" viewBox="0 0 14 14" aria-hidden="true"><path d="M11.67 3.5L5.25 9.92 2.33 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <svg class="uu-checkbox__indet" width="12" height="2" viewBox="0 0 14 14" aria-hidden="true"><path d="M2.92 7H11.08" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </span>
      <span class="uu-checkbox__label">md size</span>
    </label>
  </div>
</body>
</html>
