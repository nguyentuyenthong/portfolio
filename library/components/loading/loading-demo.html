<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loading Indicator — Thickness · Untitled UI</title>
  <link rel="stylesheet" href="../../foundations/thickness.css" />
  <link rel="stylesheet" href="../../foundations/base.css" />
  <link rel="stylesheet" href="../_shared/demo-shell.css" />
  <link rel="stylesheet" href="loading.css" />
</head>
<body class="light-mode">
  <div class="demo-page">
    <p class="demo-page__back"><a href="../../demo/index.html">← Component index</a></p>
    <h1 class="demo-page__title">Loading Indicator</h1>
    <p class="demo-page__meta">Untitled UI · Application/LoadingIndicator · type × size</p>

    <div class="demo-toolbar">
      <button type="button" class="uu-button" data-uu-size="md" data-uu-hierarchy="secondary-gray" id="theme-toggle">Light / Dark</button>
    </div>

    <table class="demo-matrix">
      <caption>Type · size md</caption>
      <thead><tr><th>Type</th><th>Indicator</th></tr></thead>
      <tbody>
        <tr>
          <td>line-simple</td>
          <td>
            <div class="uu-loading" data-uu-size="md" role="status" aria-label="Loading">
              <svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none">
                <circle class="uu-loading__track" cx="16" cy="16" r="14" stroke-width="4" />
                <circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round" />
              </svg>
            </div>
          </td>
        </tr>
        <tr>
          <td>line-spinner</td>
          <td>
            <div class="uu-loading" data-uu-size="md" role="status" aria-label="Loading">
              <svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none">
                <circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="40" stroke-linecap="round" />
              </svg>
            </div>
          </td>
        </tr>
        <tr>
          <td>dot-circle</td>
          <td>
            <div class="uu-loading" data-uu-size="md" role="status" aria-label="Loading">
              <svg class="uu-loading__spinner" viewBox="0 0 36 36" fill="none" style="color: var(--brand-600)">
                <path d="M34 18C34 15.8989 33.5861 13.8183 32.7821 11.8771C31.978 9.93586 30.7994 8.17203 29.3137 6.68629C27.828 5.20055 26.0641 4.022 24.1229 3.21793C22.1817 2.41385 20.1011 2 18 2C15.8988 2 13.8183 2.41385 11.8771 3.21793C9.93585 4.022 8.17203 5.20055 6.68629 6.68629C5.20055 8.17203 4.022 9.93586 3.21793 11.8771C2.41385 13.8183 2 15.8989 2 18" stroke="url(#p0)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0.1 8" />
                <path d="M3.21793 24.1229C4.022 26.0641 5.20055 27.828 6.68629 29.3137C8.17203 30.7994 9.93585 31.978 11.8771 32.7821C13.8183 33.5861 15.8988 34 18 34C20.1011 34 22.1817 33.5861 24.1229 32.7821C26.0641 31.978 27.828 30.7994 29.3137 29.3137C30.7994 27.828 31.978 26.0641 32.7821 24.1229" stroke="url(#p1)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0.1 8" />
                <defs>
                  <linearGradient id="p0" x1="34" y1="18" x2="2" y2="18" gradientUnits="userSpaceOnUse"><stop stop-color="currentColor" /><stop offset="1" stop-color="currentColor" stop-opacity="0.5" /></linearGradient>
                  <linearGradient id="p1" x1="33" y1="23.5" x2="3" y2="24" gradientUnits="userSpaceOnUse"><stop stop-opacity="0" stop-color="currentColor" /><stop offset="1" stop-color="currentColor" stop-opacity="0.48" /></linearGradient>
                </defs>
              </svg>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <table class="demo-matrix">
      <caption>Size · type line-simple</caption>
      <thead><tr><th>Size</th><th>Indicator</th></tr></thead>
      <tbody>
        <tr><td>sm</td><td><div class="uu-loading" data-uu-size="sm" role="status" aria-label="Loading"><svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none"><circle class="uu-loading__track" cx="16" cy="16" r="14" stroke-width="4" /><circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round" /></svg></div></td></tr>
        <tr><td>md</td><td><div class="uu-loading" data-uu-size="md" role="status" aria-label="Loading"><svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none"><circle class="uu-loading__track" cx="16" cy="16" r="14" stroke-width="4" /><circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round" /></svg></div></td></tr>
        <tr><td>lg + label</td><td><div class="uu-loading" data-uu-size="lg" role="status"><svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none"><circle class="uu-loading__track" cx="16" cy="16" r="14" stroke-width="4" /><circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round" /></svg><span class="uu-loading__label">Loading…</span></div></td></tr>
        <tr><td>xl</td><td><div class="uu-loading" data-uu-size="xl" role="status" aria-label="Loading"><svg class="uu-loading__spinner" viewBox="0 0 32 32" fill="none"><circle class="uu-loading__track" cx="16" cy="16" r="14" stroke-width="4" /><circle class="uu-loading__arc" cx="16" cy="16" r="14" stroke-width="4" stroke-dasharray="100" stroke-dashoffset="75" stroke-linecap="round" /></svg></div></td></tr>
      </tbody>
    </table>
  </div>
  <script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      document.body.classList.toggle("light-mode");
    });
  </script>
</body>
</html>
